name: Upstream Sync Test

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NEXT_PUBLIC_API_BASE: "http://localhost:8001"

permissions:
  contents: read

jobs:
  verify-upstream-sync:
    if: github.event.pull_request.head.repo.full_name == github.repository && contains(github.event.pull_request.labels.*.name, 'upstream-sync')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run upstream sync verification
        id: verify
        run: |
          set +e

          workdir="${RUNNER_TEMP}/upstream-sync-test"
          mkdir -p "$workdir"

          python_status="skipped"
          web_status="skipped"

          if python -m pip install --upgrade pip >"$workdir/pip-install.log" 2>&1 \
            && pip install -r requirements/dev.txt >>"$workdir/pip-install.log" 2>&1 \
            && pip install -e . >>"$workdir/pip-install.log" 2>&1; then
            mkdir -p data/user/settings
            printf '%s\n' \
              'system:' \
              '  language: en' \
              'logging:' \
              '  level: WARNING' \
              > data/user/settings/main.yaml

            if find tests -type f | grep -q .; then
              if pytest -q --import-mode=importlib \
                tests/api \
                tests/cli \
                tests/services/test_model_catalog.py \
                tests/services/test_path_service.py \
                tests/services/memory \
                tests/services/session \
                tests/tools \
                tests/agents/research/test_request_config.py \
                tests/agents/math_animator/test_request_config.py \
                tests/agents/math_animator/test_utils.py \
                tests/services/llm/test_utils.py \
                >"$workdir/pytest.log" 2>&1; then
                python_status="passed"
              else
                python_status="failed"
              fi
            else
              echo "No DeepTutor tests found." >"$workdir/pytest.log"
              python_status="skipped"
            fi
          else
            echo "Python dependency installation failed." >"$workdir/pytest.log"
            python_status="failed"
          fi

          if (
            cd web && npm ci >"$workdir/npm-install.log" 2>&1
          ); then
            if (
              cd web && NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_ci_publishable_key \
                CLERK_SECRET_KEY=sk_test_ci_secret_key \
                NEXT_PUBLIC_CLERK_KEYLESS_DISABLED=true \
                NEXT_PUBLIC_APP_URL=http://127.0.0.1:3000 \
                NEXT_PUBLIC_API_BASE=http://127.0.0.1:8001 \
                DEEPTUTOR_URL=http://127.0.0.1:8001 \
                DATABASE_URL=postgresql://ci:ci@127.0.0.1:5432/ci \
                NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_ci_publishable_key \
                STRIPE_SECRET_KEY=sk_test_ci_secret_key \
                STRIPE_WEBHOOK_SECRET=whsec_ci_secret \
                STRIPE_PRO_PRICE_ID=price_ci_pro \
                STRIPE_TEAM_PRICE_ID=price_ci_team \
                npm run build >"$workdir/web-build.log" 2>&1
            ); then
              web_status="passed"
            else
              web_status="failed"
            fi
          else
            echo "npm install failed." >"$workdir/web-build.log"
            web_status="failed"
          fi

          overall_status="passed"
          if [ "$python_status" = "failed" ] || [ "$web_status" = "failed" ]; then
            overall_status="failed"
          fi

          {
            echo "python_status=$python_status"
            echo "web_status=$web_status"
            echo "overall_status=$overall_status"
            echo "python_tail<<__EOF__"
            tail -n 80 "$workdir/pytest.log"
            echo "__EOF__"
            echo "web_tail<<__EOF__"
            tail -n 80 "$workdir/web-build.log"
            echo "__EOF__"
          } >>"$GITHUB_OUTPUT"

          exit 0

      - name: Summarize verification results
        if: always()
        env:
          PYTHON_STATUS: ${{ steps.verify.outputs.python_status }}
          WEB_STATUS: ${{ steps.verify.outputs.web_status }}
          PYTHON_TAIL: ${{ steps.verify.outputs.python_tail }}
          WEB_TAIL: ${{ steps.verify.outputs.web_tail }}
        run: |
          {
            echo "## Upstream Sync Verification"
            echo
            echo "- DeepTutor tests: ${PYTHON_STATUS:-skipped}"
            echo "- npm run build in web/: ${WEB_STATUS:-skipped}"
            echo
            echo "### DeepTutor tests log tail"
            echo
            echo '```text'
            printf '%s\n' "${PYTHON_TAIL:-No test output captured.}"
            echo '```'
            echo
            echo "### Web build log tail"
            echo
            echo '```text'
            printf '%s\n' "${WEB_TAIL:-No build output captured.}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail when verification fails
        if: steps.verify.outputs.overall_status != 'passed'
        run: exit 1
