name: Tests

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "web/**"
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "tests/**"
      - "requirements/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - "Dockerfile.backend"
      - "docker-compose.ghcr.yml"
      - "railway.toml"
      - "web/railway.toml"
      - ".github/workflows/tests.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "web/**"
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "tests/**"
      - "requirements/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile"
      - "Dockerfile.backend"
      - "docker-compose.ghcr.yml"
      - "railway.toml"
      - "web/railway.toml"
      - ".github/workflows/tests.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  web-launch-checks:
    name: Web Launch Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck web launch slice
        working-directory: web
        run: npm run typecheck

      - name: Run targeted web launch tests
        working-directory: web
        run: npm run test:node

      - name: Build web production app
        working-directory: web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_publishable_key
          CLERK_SECRET_KEY: sk_test_ci_secret_key
          NEXT_PUBLIC_CLERK_KEYLESS_DISABLED: "true"
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_API_BASE: http://127.0.0.1:8001
          DEEPTUTOR_URL: http://127.0.0.1:8001
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci_publishable_key
          STRIPE_SECRET_KEY: sk_test_ci_secret_key
          STRIPE_WEBHOOK_SECRET: whsec_ci_secret
          STRIPE_PRO_PRICE_ID: price_ci_pro
          STRIPE_TEAM_PRICE_ID: price_ci_team
        run: npm run build

  import-check:
    name: Import Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements/server.txt', 'requirements/cli.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install minimal dependencies for import check
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/server.txt

      - name: Check module imports
        run: |
          echo "🐍 Testing with Python ${{ matrix.python-version }}"
          python -c "from deeptutor.runtime.orchestrator import ChatOrchestrator; print('✅ Orchestrator imports OK')"
          python -c "from deeptutor.runtime.registry.tool_registry import get_tool_registry; print('✅ Tool registry imports OK')"
          python -c "from deeptutor.runtime.registry.capability_registry import get_capability_registry; print('✅ Capability registry imports OK')"
          python -c "from deeptutor.services.config.env_store import EnvStore; print('✅ EnvStore imports OK')"
          python -c "from deeptutor.api.routers.unified_ws import unified_websocket; print('✅ Unified WS imports OK')"
          python -c "from deeptutor.services.prompt.manager import PromptManager; print('✅ Prompt manager imports OK')"
          python -c "from deeptutor.logging import get_logger; print('✅ Logging imports OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}

  smoke-tests:
    name: Smoke Tests (Python 3.11)
    runs-on: ubuntu-latest
    needs: [web-launch-checks, import-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements/tutorbot.txt', 'requirements/server.txt', 'requirements/cli.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/server.txt
          pip install -r requirements/tutorbot.txt
          pip install pytest pytest-asyncio

      - name: Create minimal runtime config
        run: |
          mkdir -p data/user/settings
          cat > data/user/settings/main.yaml <<'YAML'
          system:
            language: en
          logging:
            level: WARNING
          YAML
          cat > data/user/settings/agents.yaml <<'YAML'
          capabilities: {}
          tools: {}
          plugins: {}
          diagnostics: {}
          YAML

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke test subset"
          pytest -q --import-mode=importlib \
            tests/api \
            tests/cli \
            tests/agents/guide/test_guide_manager_kb_flow.py \
            tests/services/test_model_catalog.py \
            tests/services/test_path_service.py \
            tests/services/memory \
            tests/services/session \
            tests/tools
        env:
          PYTHONPATH: ${{ github.workspace }}

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [web-launch-checks, import-check, smoke-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          {
            echo "## 🧪 Test Results Summary"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Web launch checks | ${{ needs.web-launch-checks.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| Import check (3.11/3.12) | ${{ needs.import-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| Smoke tests (3.11) | ${{ needs.smoke-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if tests failed
        if: needs.web-launch-checks.result != 'success' || needs.import-check.result != 'success' || needs.smoke-tests.result != 'success'
        run: exit 1
