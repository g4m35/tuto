name: Tests

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "web/**"
      - "tests/**"
      - "requirements/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "deeptutor/**"
      - "deeptutor_cli/**"
      - "web/**"
      - "tests/**"
      - "requirements/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  import-check:
    name: Import Check (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements/server.txt', 'requirements/cli.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install minimal dependencies for import check
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/server.txt

      - name: Check module imports
        run: |
          echo "🐍 Testing with Python ${{ matrix.python-version }}"
          python -c "from deeptutor.runtime.orchestrator import ChatOrchestrator; print('✅ Orchestrator imports OK')"
          python -c "from deeptutor.runtime.registry.tool_registry import get_tool_registry; print('✅ Tool registry imports OK')"
          python -c "from deeptutor.runtime.registry.capability_registry import get_capability_registry; print('✅ Capability registry imports OK')"
          python -c "from deeptutor.services.config.env_store import EnvStore; print('✅ EnvStore imports OK')"
          python -c "from deeptutor.api.routers.unified_ws import unified_websocket; print('✅ Unified WS imports OK')"
          python -c "from deeptutor.services.prompt.manager import PromptManager; print('✅ Prompt manager imports OK')"
          python -c "from deeptutor.logging import get_logger; print('✅ Logging imports OK')"
        env:
          PYTHONPATH: ${{ github.workspace }}

  smoke-tests:
    name: Smoke Tests (Python 3.11)
    runs-on: ubuntu-latest
    needs: import-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.11-${{ hashFiles('requirements/tutorbot.txt', 'requirements/server.txt', 'requirements/cli.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.11-

      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/tutorbot.txt
          pip install pytest pytest-asyncio

      - name: Create minimal runtime config
        run: |
          mkdir -p data/user/settings
          cat > data/user/settings/main.yaml <<'YAML'
          system:
            language: en
          logging:
            level: WARNING
          YAML

      - name: Run smoke tests
        run: |
          echo "🧪 Running smoke test subset"
          pytest -q --import-mode=importlib \
            tests/api \
            tests/cli \
            tests/agents/guide/test_guide_manager_kb_flow.py \
            tests/services/test_app_facade.py \
            tests/services/test_model_catalog.py \
            tests/services/test_path_service.py \
            tests/services/memory \
            tests/services/session \
            tests/tools
        env:
          PYTHONPATH: ${{ github.workspace }}

  web-launch-smoke:
    name: Web Launch Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Run launch-slice web tests
        run: |
          node --test \
            tests/billing.test.ts \
            tests/pricing-readiness.test.ts \
            tests/launch-route-contracts.test.ts \
            tests/stripe-webhook-route.test.ts
        working-directory: web

      - name: Build web app
        run: npm run build
        working-directory: web
        env:
          DEEPTUTOR_URL: http://localhost:8001
          NEXT_PUBLIC_API_BASE: http://localhost:8001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_launch_smoke
          CLERK_SECRET_KEY: sk_test_launch_smoke
          NEXT_PUBLIC_CLERK_KEYLESS_DISABLED: "true"
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /dashboard

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [import-check, smoke-tests, web-launch-smoke]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Import check (3.11/3.12) | ${{ needs.import-check.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke tests (3.11) | ${{ needs.smoke-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web launch smoke | ${{ needs.web-launch-smoke.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if tests failed
        if: needs.import-check.result == 'failure' || needs.smoke-tests.result == 'failure' || needs.web-launch-smoke.result == 'failure'
        run: exit 1
