name: Upstream Sync

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  upstream-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure upstream remote
        run: |
          git remote add upstream https://github.com/HKUDS/DeepTutor.git 2>/dev/null || git remote set-url upstream https://github.com/HKUDS/DeepTutor.git
          git fetch upstream --tags --prune

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare sync branch and PR body
        id: prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/upstream_sync.py \
            --base-ref main \
            --upstream-remote upstream \
            --repo HKUDS/DeepTutor \
            --changelog CHANGELOG-upstream.md \
            --output "${{ runner.temp }}/upstream-sync-pr.md"

      - name: Stop when there is nothing new to sync
        if: steps.prepare.outputs.new_release != 'true' && steps.prepare.outputs.blocked != 'true'
        run: |
          echo "${{ steps.prepare.outputs.reason || 'No unsynced upstream release found.' }}"

      - name: Push sync branch
        if: steps.prepare.outputs.new_release == 'true'
        run: |
          git push --force-with-lease origin "${{ steps.prepare.outputs.branch }}"

      - name: Ensure sync labels exist
        if: steps.prepare.outputs.new_release == 'true' || steps.prepare.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create upstream-sync --color 1D76DB --description "Review required for upstream DeepTutor sync PRs" 2>/dev/null || true
          gh label create needs-review --color FBCA04 --description "Manual maintainer review required before merge" 2>/dev/null || true

      - name: Create or update blocked sync issue
        id: blocked_issue
        if: steps.prepare.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Upstream sync blocked: DeepTutor ${{ steps.prepare.outputs.tag }}"
          body_path="${{ steps.prepare.outputs.body_path }}"
          issue_number="$(gh issue list --state open --label upstream-sync --json number,title --jq '.[] | select(.title == "'"$title"'") | .number' | head -n 1)"

          if [ -z "$issue_number" ]; then
            gh issue create \
              --title "$title" \
              --body-file "$body_path" \
              --label upstream-sync \
              --label needs-review
            issue_number="$(gh issue list --state open --label upstream-sync --json number,title --jq '.[] | select(.title == "'"$title"'") | .number' | head -n 1)"
          else
            gh issue edit "$issue_number" --title "$title" --body-file "$body_path"
            gh issue edit "$issue_number" --add-label upstream-sync --add-label needs-review
          fi

          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

      - name: Create or update upstream sync PR
        id: pr
        if: steps.prepare.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ steps.prepare.outputs.branch }}"
          title="${{ steps.prepare.outputs.title }}"
          body_path="${{ steps.prepare.outputs.body_path }}"
          pr_number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')"

          if [ -z "$pr_number" ]; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "$title" \
              --body-file "$body_path"
            pr_number="$(gh pr list --head "$branch" --base main --state open --json number --jq '.[0].number')"
          else
            gh pr edit "$pr_number" --title "$title" --body-file "$body_path"
          fi

          gh pr edit "$pr_number" --add-label upstream-sync --add-label needs-review
          gh pr edit "$pr_number" --add-reviewer g4m35 2>/dev/null || true

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Summarize blocked sync result
        if: steps.prepare.outputs.blocked == 'true'
        run: |
          {
            echo "## Upstream Sync Blocked"
            echo ""
            echo "- Release: ${{ steps.prepare.outputs.tag }}"
            echo "- Issue: #${{ steps.blocked_issue.outputs.issue_number }}"
            echo "- Auto-resolved safe conflicts:"
            if [ -n "${{ steps.prepare.outputs.auto_resolved }}" ]; then
              while IFS= read -r path; do
                [ -n "$path" ] && echo "  - \`$path\`"
              done <<'EOF'
${{ steps.prepare.outputs.auto_resolved }}
EOF
            else
              echo "  - None"
            fi
            echo "- Remaining conflicts:"
            while IFS= read -r path; do
              [ -n "$path" ] && echo "  - \`$path\`"
            done <<'EOF'
${{ steps.prepare.outputs.conflicts }}
EOF
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize sync result
        if: steps.prepare.outputs.new_release == 'true'
        run: |
          {
            echo "## Upstream Sync"
            echo ""
            echo "- Release: ${{ steps.prepare.outputs.tag }}"
            echo "- Branch: \`${{ steps.prepare.outputs.branch }}\`"
            echo "- PR: #${{ steps.pr.outputs.pr_number }}"
            echo "- Auto-merge: disabled"
          } >> "$GITHUB_STEP_SUMMARY"
